# Force a single postcss instance across the dep tree. Stylelint's custom syntax
# (postcss-styled-jsx via @dhis2/cli-style) and stylelint itself must share the
# same postcss, otherwise documents parsed by one are unintelligible to the other.
# Install native binaries for the current platform (keep `current` in every list, or the
# host/CI loses its own arch) plus Linux arm64 glibc, so a single install also serves an
# arm64 Linux container that shares this node_modules.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - arm64
  libc:
    - glibc
overrides:
  postcss: ^8.5.15
allowBuilds:
  '@dhis2/cli-helpers-engine': true
  '@dhis2/cli-style': true
  '@parcel/watcher': true
  core-js: true
  core-js-pure: true
  cypress: true
  esbuild: true
  opensrc: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@dhis2/*'
  - '@dhis2-ui/*'
onlyBuiltDependencies:
  - '@dhis2/cli-helpers-engine'
  - '@dhis2/cli-style'
  - '@parcel/watcher'
  - core-js
  - core-js-pure
  - cypress
  - esbuild
  - opensrc
  - unrs-resolver
# These hoists are needed for @dhis2/app-shell since it uses directly some libraries that were hoisted by yarn 1
# This is a better alternative than pnpm's shamefullyHoist https://pnpm.io/settings#shamefullyhoist until we update the way that @dhis2/app-shell works
publicHoistPattern:
  - '@dhis2/ui'
  - 'typeface-roboto'
  - '@dhis2/app-adapter'
  - 'prop-types'
  - '@dhis2/d2-i18n'
  - 'post-robot'
  - 'styled-jsx'
  - '@dhis2/pwa'
